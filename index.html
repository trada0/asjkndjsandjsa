<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: #FFF8E7;  /* vàng nhạt chủ đạo */
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
    border-bottom: 3px solid #FFD966;
}

.header h1{
    color:#FFD966;
    font-size:clamp(32px,8vw,90px);
    font-weight:800;
    letter-spacing:3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-radius: 24px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.25);
    border: 2px solid #FFD966;
    overflow: hidden;
}

.play-btn {
    width: 90px;
    height: 90px;
    background: #FFD966;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    position: relative;
}

.play-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255, 217, 102, 0.4);
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: -1;
}

.play-btn:hover::before {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
}

.play-btn:hover {
    transform: scale(1.08);
    background: #FFC107;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
}

.play-icon {
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 32px solid #000;
    margin-left: 8px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
}

@media (max-width: 640px) {
    .play-btn {
        width: 70px;
        height: 70px;
    }
    .play-icon {
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        border-left: 24px solid #000;
        margin-left: 5px;
    }
}

@media (max-width: 480px) {
    .play-btn {
        width: 60px;
        height: 60px;
    }
    .play-icon {
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        border-left: 20px solid #000;
        margin-left: 4px;
    }
}

.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #FFD966;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 600;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 20px;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,217,102,0.2);
    border-top: 5px solid #FFD966;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    background: #000;
    color: #FFD966;
    border-top: 2px solid #FFD966;
    margin-top: auto;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

/* Popup hướng dẫn - KHÔNG CÓ NÚT ĐÓNG, KHÔNG THỂ TẮT */
.fb-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
    backdrop-filter: blur(6px);
}

.fb-popup-content {
    width: min(90vw, 550px);
    background: #000;
    border-radius: 28px;
    overflow: hidden;
    border: 2px solid #FFD966;
    box-shadow: 0 25px 45px rgba(0,0,0,0.5);
    text-align: center;
    padding: 24px 20px 24px 20px;
}

.fb-popup-content p {
    color: #FFD966;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.4;
    padding: 0 10px;
}

.fb-popup-content img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
    border: 1px solid #FFD966;
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton">
            <div class="play-icon"></div>
        </div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<!-- Popup hướng dẫn - KHÔNG THỂ ĐÓNG, chỉ hiện trên Facebook App (mobile) -->
<div class="fb-popup-overlay hidden" id="fbPopup">
    <div class="fb-popup-content">
        <p>Bạn đang mở web site bằng app facebook, hãy thao tác như hình dưới để tiếp tục</p>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780564000303_Fot9GpwfM3.jpg" alt="Hướng dẫn">
    </div>
</div>

<script>
// Chỉ hiển thị popup trên Facebook App (mobile) sau 2 giây
// Popup KHÔNG có nút đóng, không thể tắt bằng bất kỳ cách nào

(function() {
    // Kiểm tra thiết bị di động
    function isMobileDevice() {
        return /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }
    
    // Kiểm tra Facebook in-app browser
    function isFacebookApp() {
        return navigator.userAgent.includes('FBAN') || navigator.userAgent.includes('FBAV');
    }
    
    const isMobile = isMobileDevice();
    const isFbApp = isFacebookApp();
    
    const popup = document.getElementById('fbPopup');
    
    // Chỉ hiển thị nếu là mobile + Facebook App
    if (isMobile && isFbApp && popup) {
        // Hiện popup sau 2 giây
        setTimeout(function() {
            popup.classList.remove('hidden');
        }, 2000);
        
        // KHÔNG có sự kiện đóng popup -> người dùng không thể tắt được
        // (Đã loại bỏ nút close và không gắn sự kiện click vào overlay)
    } else {
        // Nếu không phải điều kiện, đảm bảo popup ẩn
        if (popup) popup.classList.add('hidden');
    }
    
    // Nút Play: hiển thị loading video
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            if (playBtn.style.display !== 'none' && loadingDiv.style.display !== 'flex') {
                playBtn.style.display = 'none';
                loadingDiv.style.display = 'flex';
            }
        });
    }
})();
</script>

</body>
</html>
