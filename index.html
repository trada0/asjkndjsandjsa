<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhimReview.vn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e7b9bf;
    font-family:Arial,sans-serif;
    min-height:100vh;
}

.header{
    width:100%;
    background:#000;
    text-align:center;
    padding:20px 0;
}

.logo{
    color:#ff0048;
    font-size:clamp(40px,12vw,110px);
    font-weight:bold;
    text-shadow:
        3px 3px 0 #cfcfcf,
        -1px -1px 0 #cfcfcf,
        1px -1px 0 #cfcfcf,
        -1px 1px 0 #cfcfcf;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:12vw 0 0;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    position:relative;
}

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:clamp(60px,12vw,105px);
    height:clamp(60px,12vw,105px);
    border:4px solid #cfcfcf;
    border-radius:50%;
}

.play-btn::before{
    content:"";
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-35%,-50%);
    width:0;
    height:0;
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #cfcfcf;
}
</style>
</head>
<body>

<div class="header">
    <div class="logo">PhimReview.vn</div>
</div>

<div class="container">
    <div class="video-box">
        <div class="play-btn"></div>
    </div>
</div>

</body>
</html>
