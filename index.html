<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: #FFF8E7;  /* vàng nhạt chủ đạo */
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;  /* đen */
    padding:20px 0;
    text-align:center;
    border-bottom: 3px solid #FFD966;
}

.header h1{
    color:#FFD966;  /* vàng nhạt nổi bật trên nền đen */
    font-size:clamp(32px,8vw,90px);
    font-weight:800;
    letter-spacing:3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-radius: 24px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.25);
    border: 2px solid #FFD966;
    overflow: hidden;
}

/* Nút play được thiết kế lại cân đối, đẹp mắt */
.play-btn {
    width: 90px;
    height: 90px;
    background: #FFD966;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    position: relative;
}

/* Hiệu ứng vòng tròn lan tỏa khi hover */
.play-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255, 217, 102, 0.4);
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: -1;
}

.play-btn:hover::before {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
}

.play-btn:hover {
    transform: scale(1.08);
    background: #FFC107;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
}

/* Icon tam giác play, cân chỉnh hoàn hảo */
.play-icon {
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 32px solid #000;
    margin-left: 8px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
}

@media (max-width: 640px) {
    .play-btn {
        width: 70px;
        height: 70px;
    }
    .play-icon {
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        border-left: 24px solid #000;
        margin-left: 5px;
    }
}

@media (max-width: 480px) {
    .play-btn {
        width: 60px;
        height: 60px;
    }
    .play-icon {
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        border-left: 20px solid #000;
        margin-left: 4px;
    }
}

.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #FFD966;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 600;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 20px;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,217,102,0.2);
    border-top: 5px solid #FFD966;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    background: #000;
    color: #FFD966;
    border-top: 2px solid #FFD966;
    margin-top: auto;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

/* Popup ảnh - style */
.image-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
    backdrop-filter: blur(4px);
}

.image-popup-content {
    position: relative;
    width: min(90vw, 650px);
    background: #000;
    border-radius: 24px;
    overflow: hidden;
    border: 2px solid #FFD966;
    box-shadow: 0 25px 40px rgba(0,0,0,0.5);
}

.image-popup-content img {
    width: 100%;
    height: auto;
    display: block;
    cursor: pointer;
}

.popup-close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #FFD966;
    color: #000;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.popup-close-btn:hover {
    background: #FFC107;
    transform: scale(1.05);
}

/* Ẩn popup mặc định */
.image-popup-overlay.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton">
            <div class="play-icon"></div>
        </div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<!-- Popup ảnh duy nhất -->
<div class="image-popup-overlay hidden" id="imagePopup">
    <div class="image-popup-content">
        <button class="popup-close-btn" id="closePopupBtn">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780559131638_KLJja0rCep.jpg" alt="Popup Image" id="popupImage">
    </div>
</div>

<script>
// Chức năng:
// 1. Popup ảnh tự động hiện sau 1 giây kể từ khi trang tải, CHỈ trên thiết bị di động.
// 2. Người dùng có thể đóng popup bằng nút X, click vào overlay (nền đen) hoặc click vào ảnh.
// 3. Khi đóng popup, không hiện lại nữa trong phiên hiện tại (không cần cookie vì yêu cầu trước đó đã xóa).
// 4. Nút play hoạt động độc lập: click -> ẩn nút play, hiện loading (vô hạn, giả lập đang tải video).
// 5. Trên PC: không có popup, nút play vẫn hoạt động loading bình thường.

(function() {
    // Kiểm tra thiết bị di động (mobile)
    function isMobileDevice() {
        return /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }
    
    const isMobile = isMobileDevice();
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    const popupOverlay = document.getElementById('imagePopup');
    const closeBtn = document.getElementById('closePopupBtn');
    const popupImg = document.getElementById('popupImage');
    
    // --- Nút Play: hoạt động trên mọi thiết bị (ẩn play, hiện loading) ---
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            // Chỉ hoạt động nếu nút play đang hiển thị và loading đang ẩn
            if (playBtn.style.display !== 'none' && loadingDiv.style.display !== 'flex') {
                playBtn.style.display = 'none';
                loadingDiv.style.display = 'flex';
            }
        });
    }
    
    // --- Popup: chỉ trên mobile, tự động hiện sau 1 giây, và chỉ hiện một lần ---
    if (isMobile && popupOverlay && closeBtn) {
        let popupShown = false;  // đảm bảo chỉ hiện một lần
        
        // Hàm hiển thị popup
        function showPopup() {
            if (!popupShown && popupOverlay.classList.contains('hidden')) {
                popupShown = true;
                popupOverlay.classList.remove('hidden');
            }
        }
        
        // Hàm đóng popup (ẩn đi, không hiện lại)
        function closePopup() {
            if (!popupOverlay.classList.contains('hidden')) {
                popupOverlay.classList.add('hidden');
            }
        }
        
        // Tự động hiện popup sau 1 giây khi trang đã tải xong
        setTimeout(showPopup, 1000);
        
        // Sự kiện đóng popup: nút X
        closeBtn.addEventListener('click', closePopup);
        
        // Click vào overlay (nền đen) cũng đóng
        popupOverlay.addEventListener('click', function(e) {
            if (e.target === popupOverlay) {
                closePopup();
            }
        });
        
        // Click vào ảnh cũng đóng (có thể tùy chỉnh, nhưng để đồng nhất thì đóng)
        if (popupImg) {
            popupImg.addEventListener('click', function(e) {
                e.stopPropagation();
                closePopup();
            });
        }
    } else {
        // Nếu không phải mobile, đảm bảo popup luôn ẩn (ẩn cứng)
        if (popupOverlay) {
            popupOverlay.classList.add('hidden');
            // Thêm style mạnh hơn để không thể hiện
            popupOverlay.style.display = 'none';
        }
    }
})();
</script>

</body>
</html>
