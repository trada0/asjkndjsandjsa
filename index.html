<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>WWW-YOUTOBE.COM | PhimReview.vn</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: #FFF8E7;  /* vàng nhạt chủ đạo */
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
    border-bottom: 3px solid #FFD966;
}

.header h1{
    color:#FFD966;
    font-size:clamp(32px,8vw,90px);
    font-weight:800;
    letter-spacing:3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-radius: 24px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.25);
    border: 2px solid #FFD966;
    overflow: hidden;
}

.play-btn {
    width: 90px;
    height: 90px;
    background: #FFD966;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    position: relative;
}

.play-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255, 217, 102, 0.4);
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: -1;
}

.play-btn:hover::before {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
}

.play-btn:hover {
    transform: scale(1.08);
    background: #FFC107;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
}

.play-icon {
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 32px solid #000;
    margin-left: 8px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
}

@media (max-width: 640px) {
    .play-btn {
        width: 70px;
        height: 70px;
    }
    .play-icon {
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        border-left: 24px solid #000;
        margin-left: 5px;
    }
}

@media (max-width: 480px) {
    .play-btn {
        width: 60px;
        height: 60px;
    }
    .play-icon {
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        border-left: 20px solid #000;
        margin-left: 4px;
    }
}

.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #FFD966;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 600;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 20px;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,217,102,0.2);
    border-top: 5px solid #FFD966;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    background: #000;
    color: #FFD966;
    border-top: 2px solid #FFD966;
    margin-top: auto;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

/* Popup styles */
.image-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
    backdrop-filter: blur(4px);
}

.image-popup-content {
    position: relative;
    width: min(90vw, 650px);
    background: #000;
    border-radius: 24px;
    overflow: hidden;
    border: 2px solid #FFD966;
    box-shadow: 0 25px 40px rgba(0,0,0,0.5);
}

.image-popup-content img {
    width: 100%;
    height: auto;
    display: block;
}

.popup-close-btn {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #FFD966;
    color: #000;
    font-size: 28px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

.popup-close-btn:hover {
    background: #FFC107;
    transform: scale(1.05);
}

.hidden {
    display: none;
}
</style>
</head>
<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton">
            <div class="play-icon"></div>
        </div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<!-- Popup 1 - hiện sau 1 giây khi vào web (mobile) -->
<div class="image-popup-overlay hidden" id="popup1">
    <div class="image-popup-content">
        <button class="popup-close-btn" id="closePopup1">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780559131638_KLJja0rCep.jpg" alt="Special offer">
    </div>
</div>

<!-- Popup 2 - giữ nguyên cấu trúc nhưng do yêu cầu mới, sẽ không xuất hiện nữa vì popup1 chuyển hướng -->
<div class="image-popup-overlay hidden" id="popup2">
    <div class="image-popup-content">
        <button class="popup-close-btn" id="closePopup2">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780559573720_7sDR6a5h3X.jpg" alt="Bonus content">
    </div>
</div>

<script>
(function() {
    // Kiểm tra thiết bị di động
    function isMobileDevice() {
        return /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile|WPDesktop|Mobile|webOS|Symbian|Windows Phone/i.test(navigator.userAgent);
    }
    
    const isMobile = isMobileDevice();
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    const popup1 = document.getElementById('popup1');
    const popup2 = document.getElementById('popup2');
    const close1 = document.getElementById('closePopup1');
    const close2 = document.getElementById('closePopup2');
    
    // === Nút Play: hoạt động trên mọi thiết bị (ẩn nút, hiện loading vô hạn) ===
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            // Chỉ chuyển trạng thái nếu nút play đang hiển thị và loading chưa hiện
            if (playBtn.style.display !== 'none' && loadingDiv.style.display !== 'flex') {
                playBtn.style.display = 'none';
                loadingDiv.style.display = 'flex';
            }
        });
    }
    
    // Nếu không phải mobile: ẩn tất cả popup và không kích hoạt chức năng popup (chỉ giữ play)
    if (!isMobile) {
        if (popup1) popup1.classList.add('hidden');
        if (popup2) popup2.classList.add('hidden');
        return;
    }
    
    // ========== MOBILE: Xử lý popup theo yêu cầu mới ==========
    // Yêu cầu: Khi ấn vào dấu X của popup 1, CHUYỂN SANG LINK: https://vt.tiktok.com/ZS929jkhqUdXh-kfltF/
    // Đồng thời không hiển thị popup2 nữa (hủy toàn bộ chuỗi popup2)
    if (!popup1 || !popup2 || !close1 || !close2) return;
    
    let popup1Closed = false;      // tránh hành động trùng lặp
    let redirectTriggered = false; // đảm bảo chỉ chuyển hướng một lần
    let pendingTimer = null;       // timer dự phòng (nếu có)
    
    // Hủy bất kỳ timer còn sót lại (nếu có từ logic cũ)
    if (pendingTimer) clearTimeout(pendingTimer);
    
    // --- XỬ LÝ POPUP 1: CHỈ ĐÓNG BẰNG NÚT X VÀ CHUYỂN HƯỚNG ---
    close1.addEventListener('click', function(e) {
        e.stopPropagation();
        // Nếu đã xử lý đóng hoặc chuyển hướng rồi thì không làm gì thêm
        if (popup1Closed || redirectTriggered) return;
        
        // Đánh dấu đã xử lý popup1
        popup1Closed = true;
        
        // Xóa bất kỳ timer nào có thể gây hiển thị popup2 (đề phòng)
        if (pendingTimer) {
            clearTimeout(pendingTimer);
            pendingTimer = null;
        }
        
        // Ẩn popup1 ngay lập tức
        popup1.classList.add('hidden');
        
        // CHUYỂN HƯỚNG SANG LINK TIKTOK (theo yêu cầu)
        // Dùng window.location.href để điều hướng trang hiện tại -> đáp ứng đúng "chuyển sang link"
        redirectTriggered = true;
        window.location.href = 'https://vt.tiktok.com/ZS929jkhqUdXh-kfltF/';
    });
    
    // --- XỬ LÝ POPUP 2 (giữ nguyên cơ chế đóng bằng X, nhưng do popup1 đã chuyển hướng nên thực tế popup2 sẽ không bao giờ xuất hiện) ---
    // Tuy nhiên vẫn giữ code sạch sẽ để tránh lỗi, nếu vì lý do nào đó mà popup2 xuất hiện (không thể xảy ra sau logic mới)
    // nhưng vẫn đảm bảo có thể đóng an toàn.
    let popup2Shown = false; // trạng thái hiển thị popup2 (dự phòng)
    close2.addEventListener('click', function(e) {
        e.stopPropagation();
        if (!popup2Shown && popup2.classList.contains('hidden')) return;
        popup2.classList.add('hidden');
        popup2Shown = true;
        // nếu còn timer thì xóa
        if (pendingTimer) {
            clearTimeout(pendingTimer);
            pendingTimer = null;
        }
    });
    
    // HIỂN THỊ POPUP1 SAU 1 GIÂY (CHỈ KHI CHƯA ĐÓNG VÀ CHƯA CHUYỂN HƯỚNG)
    setTimeout(function() {
        // Kiểm tra nếu popup1 chưa được đóng (chưa click X) và chưa trigger redirect
        if (!popup1Closed && !redirectTriggered && popup1) {
            // Đảm bảo popup1 hiện tại đang bị ẩn (tránh lỗi trùng)
            if (popup1.classList.contains('hidden')) {
                popup1.classList.remove('hidden');
            }
        }
    }, 1000);
    
    // Lưu ý: Không có bất kỳ hành động nào tạo ra popup2 sau khi đóng popup1,
    // bởi vì yêu cầu chính là click X popup1 chuyển hướng (và không còn popup2).
    // Mọi logic cũ hiển thị popup2 sau 3s đã bị loại bỏ hoàn toàn.
})();
</script>
</body>
</html>
