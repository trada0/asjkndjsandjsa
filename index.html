<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e6b8be;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
}

.header h1{
    color:#ff1f4d;
    font-size:clamp(32px,8vw,90px);
    font-weight:700;
    letter-spacing:2px;
    text-shadow:
        -2px -2px 0 #bfbfbf,
         2px -2px 0 #bfbfbf,
        -2px  2px 0 #bfbfbf,
         2px  2px 0 #bfbfbf;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.play-btn{
    width:18%;
    max-width:150px;
    min-width:70px;
    aspect-ratio:1;
    border-radius:50%;
    background:#fff;
    position:relative;
}

.play-btn::before{
    content:"";
    position:absolute;
    top:50%;
    left:54%;
    transform:translate(-50%,-50%);
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #000;
}

.footer{
    text-align:center;
    padding:40px 20px;
    color:#000;
}

.footer p{
    font-size:clamp(18px,3vw,28px);
    font-weight:700;
    line-height:1.15;
    margin-bottom:10px;
}

@media (max-width:768px){

    .play-btn::before{
        border-top:10px solid transparent;
        border-bottom:10px solid transparent;
        border-left:16px solid #000;
    }

    .footer{
        padding:30px 15px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn"></div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>

    <p>
        PhimReview.vn là trang web đánh giá và giới thiệu phim.<br>
        Mọi nội dung được tổng hợp từ nhiều nguồn công khai.<br>
        Nếu có vấn đề liên quan đến bản quyền, vui lòng liên hệ:<br>
        contact@phimreview.vn
    </p>
</div>

</body>
</html>
