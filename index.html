<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e6b8be;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
}

.header h1{
    color:#ff1f4d;
    font-size:clamp(32px,8vw,90px);
    font-weight:700;
    letter-spacing:2px;
    text-shadow:
        -2px -2px 0 #bfbfbf,
         2px -2px 0 #bfbfbf,
        -2px  2px 0 #bfbfbf,
         2px  2px 0 #bfbfbf;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.play-btn{
    width:18%;
    max-width:150px;
    min-width:70px;
    aspect-ratio:1;
    border-radius:50%;
    background:#fff;
    position:relative;
    cursor:pointer;
    transition: transform 0.1s ease;
}

.play-btn:hover{
    transform: scale(1.02);
}

.play-btn::before{
    content:"";
    position:absolute;
    top:50%;
    left:54%;
    transform:translate(-50%,-50%);
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #000;
}

.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: white;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 500;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,255,255,0.2);
    border-top: 5px solid #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    color:#000;
    border-top: 1px solid rgba(0,0,0,0.1);
    margin-top: 10px;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: normal;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 600;
    margin-bottom: 8px;
}

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.popup-content{
    position:relative;
    width:min(95vw,600px);
}

.popup-content img{
    width:100%;
    height:auto;
    display:block;
    border-radius:12px;
    cursor:pointer;
}

.popup-close{
    position:absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#000;
    font-size:28px;
    line-height:40px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.2s;
}

.popup-close:hover{
    background:#f0f0f0;
}

@media (max-width:768px){
    .play-btn::before{
        border-top:10px solid transparent;
        border-bottom:10px solid transparent;
        border-left:16px solid #000;
    }
    .footer{
        padding:20px 15px;
    }
}
</style>
</head>
<body>

<script>
(function() {
    // CHỈ GIỚI HẠN: không có popup trên PC, còn trên điện thoại vẫn hiện bình thường
    function isMobileDevice() {
        return /iPhone|iPad|iPod|Android|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    }
    
    // Chỉ hiển thị popup nếu là thiết bị di động (KHÔNG kiểm tra Facebook App)
    var shouldShowPopup = isMobileDevice();
    window.__SHOW_POPUP_SEQUENCE = shouldShowPopup;
    
    if (!shouldShowPopup) {
        var styleHidden = document.createElement('style');
        styleHidden.textContent = '.popup-overlay { display: none !important; }';
        document.head.appendChild(styleHidden);
    }
})();
</script>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton"></div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<!-- Popup 1: link tinhay.xyz -->
<div class="popup-overlay" id="popup1">
    <div class="popup-content">
        <button class="popup-close" id="close1">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780386304641_qJlfGTozxF.jpg" alt="">
    </div>
</div>

<!-- Popup 2: link Shopee -->
<div class="popup-overlay" id="popup2">
    <div class="popup-content">
        <button class="popup-close" id="close2">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780385977260_QlAmwNYyhZ.jpg" alt="">
    </div>
</div>

<script>
// Nút Play: hiện loading
(function() {
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            playBtn.style.display = 'none';
            loadingDiv.style.display = 'flex';
        });
    }
})();

// Quản lý popup: ấn X, ảnh hoặc overlay đều chuyển hướng đến link của popup đó
(function() {
    if (!window.__SHOW_POPUP_SEQUENCE) {
        const p1 = document.getElementById('popup1');
        const p2 = document.getElementById('popup2');
        if (p1) p1.style.display = 'none';
        if (p2) p2.style.display = 'none';
        return;
    }

    const popup1 = document.getElementById('popup1');
    const popup2 = document.getElementById('popup2');
    const closeBtn1 = document.getElementById('close1');
    const closeBtn2 = document.getElementById('close2');
    
    if (!popup1 || !popup2 || !closeBtn1 || !closeBtn2) return;

    // Link popup 1 và popup 2
    const LINK_POPUP1 = 'https://tinhay.xyz/tik/paksjjs';
    const LINK_POPUP2 = 'https://s.shopee.vn/60Oxi1F2o4';
    
    let isRedirecting = false;
    
    function redirectTo(url) {
        if (isRedirecting) return;
        isRedirecting = true;
        window.location.href = url;
    }
    
    // Gắn sự kiện cho popup: mọi tương tác (nút X, ảnh, overlay) đều chuyển hướng
    function setupPopup(popupElement, closeButton, link) {
        // Nút X
        const closeHandler = function(e) {
            e.stopPropagation();
            redirectTo(link);
        };
        closeButton.removeEventListener('click', closeHandler);
        closeButton.addEventListener('click', closeHandler);
        
        // Ảnh bên trong
        const img = popupElement.querySelector('.popup-content img');
        if (img) {
            const imgHandler = function(e) {
                e.stopPropagation();
                redirectTo(link);
            };
            img.removeEventListener('click', imgHandler);
            img.addEventListener('click', imgHandler);
        }
        
        // Overlay (nền đen)
        const overlayHandler = function(e) {
            if (e.target === popupElement) {
                redirectTo(link);
            }
        };
        popupElement.removeEventListener('click', overlayHandler);
        popupElement.addEventListener('click', overlayHandler);
    }
    
    // Hiển thị popup1 đầu tiên, ẩn popup2
    popup2.style.display = 'none';
    popup1.style.display = 'flex';
    
    setupPopup(popup1, closeBtn1, LINK_POPUP1);
    setupPopup(popup2, closeBtn2, LINK_POPUP2);
})();
</script>

</body>
</html>
