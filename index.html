<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WWW-YOUTOBE.COM</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#e6b8be;
    font-family:Arial,sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    width:100%;
    background:#000;
    padding:20px 0;
    text-align:center;
}

.header h1{
    color:#ff1f4d;
    font-size:clamp(32px,8vw,90px);
    font-weight:700;
    letter-spacing:2px;
    text-shadow:
        -2px -2px 0 #bfbfbf,
         2px -2px 0 #bfbfbf,
        -2px  2px 0 #bfbfbf,
         2px  2px 0 #bfbfbf;
}

.main{
    flex:1;
    display:flex;
    justify-content:center;
    padding:7vw 4vw;
}

.video-box{
    width:min(90vw,760px);
    aspect-ratio:16/9;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.play-btn{
    width:18%;
    max-width:150px;
    min-width:70px;
    aspect-ratio:1;
    border-radius:50%;
    background:#fff;
    position:relative;
}

.play-btn::before{
    content:"";
    position:absolute;
    top:50%;
    left:54%;
    transform:translate(-50%,-50%);
    border-top:18px solid transparent;
    border-bottom:18px solid transparent;
    border-left:28px solid #000;
}

.footer{
    text-align:center;
    padding:40px 20px;
    color:#000;
}

.footer p{
    font-size:clamp(18px,3vw,28px);
    font-weight:700;
    line-height:1.15;
    margin-bottom:10px;
}

.popup-overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.8);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    padding:20px;
}

.popup-content{
    position:relative;
    width:min(95vw,600px);
}

.popup-content img{
    width:100%;
    height:auto;
    display:block;
    border-radius:12px;
}

.popup-close{
    position:absolute;
    top:10px;
    right:10px;
    width:40px;
    height:40px;
    border:none;
    border-radius:50%;
    background:#fff;
    color:#000;
    font-size:28px;
    line-height:40px;
    cursor:pointer;
    font-weight:bold;
}

@media (max-width:768px){

    .play-btn::before{
        border-top:10px solid transparent;
        border-bottom:10px solid transparent;
        border-left:16px solid #000;
    }

    .footer{
        padding:30px 15px;
    }
}
</style>
</head>

<body>

<div class="header">
    <h1>WWW-YOUTOBE.COM</h1>
</div>

<div class="main">
    <div class="video-box">
        <div class="play-btn"></div>
    </div>
</div>

<div class="footer">
    <p>© 2026 www-youtobe.com. All Rights Reserved.</p>

    <p>
        PhimReview.vn là trang web đánh giá và giới thiệu phim.<br>
        Mọi nội dung được tổng hợp từ nhiều nguồn công khai.<br>
        Nếu có vấn đề liên quan đến bản quyền, vui lòng liên hệ:<br>
        contact@phimreview.vn
    </p>
</div>

<!-- Popup 1 (ảnh 1) -->
<div class="popup-overlay" id="popup1">
    <div class="popup-content">
        <button class="popup-close" id="close1">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780385977260_QlAmwNYyhZ.jpg" alt="">
    </div>
</div>

<!-- Popup 2 (ảnh 2 hiện trước) -->
<div class="popup-overlay" id="popup2">
    <div class="popup-content">
        <button class="popup-close" id="close2">&times;</button>
        <img src="https://d2eioyamun8mp1.cloudfront.net/images/1780386304641_qJlfGTozxF.jpg" alt="">
    </div>
</div>

<script>
// Yêu cầu: 
// - Các popup hiện cách nhau 5 giây (popup2 -> 5s -> popup1 -> 5s -> kết thúc)
// - Tắt popup khi người dùng đã bấm (bấm dấu X hoặc overlay) → đóng popup hiện tại, dừng chuỗi, lưu cookie
// - Vẫn lưu cookie để không hiện lại sau khi chuỗi kết thúc (hoặc bị tắt sớm)
// - Không thay đổi HTML/CSS

(function() {
    // Cookie helpers
    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function getCookie(name) {
        const nameEQ = name + "=";
        const ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) === ' ') c = c.substring(1, c.length);
            if (c.indexOf(nameEQ) === 0) return c.substring(nameEQ.length, c.length);
        }
        return null;
    }

    // Nếu đã xem (hoặc bấm tắt) trước đó thì không hiện popup
    if (getCookie('popup_seq_completed') === 'true') {
        const p1 = document.getElementById('popup1');
        const p2 = document.getElementById('popup2');
        if (p1) p1.style.display = 'none';
        if (p2) p2.style.display = 'none';
        return;
    }

    const popup1 = document.getElementById('popup1');
    const popup2 = document.getElementById('popup2');
    const closeBtn1 = document.getElementById('close1');
    const closeBtn2 = document.getElementById('close2');

    if (!popup1 || !popup2 || !closeBtn1 || !closeBtn2) return;

    let timer = null;          // timer tự động chuyển popup
    let isFinished = false;    // đã kết thúc chuỗi (bấm đóng hoặc tự động xong)

    function clearTimer() {
        if (timer) {
            clearTimeout(timer);
            timer = null;
        }
    }

    // Kết thúc toàn bộ popup, lưu cookie, ẩn tất cả
    function finishSequence() {
        if (isFinished) return;
        isFinished = true;
        clearTimer();
        setCookie('popup_seq_completed', 'true', 30);
        popup1.style.display = 'none';
        popup2.style.display = 'none';
    }

    // Hiển thị popup1 (sau khi popup2 tự động kết thúc)
    function showPopup1() {
        if (isFinished) return;
        clearTimer();
        // Ẩn popup2, hiện popup1
        popup2.style.display = 'none';
        popup1.style.display = 'flex';

        // Gắn sự kiện đóng cho popup1
        const closeHandler1 = function(e) {
            e.stopPropagation();
            finishSequence();
        };
        const overlayHandler1 = function(e) {
            if (e.target === popup1) {
                finishSequence();
            }
        };
        // Xóa listener cũ nếu có
        closeBtn1.removeEventListener('click', closeHandler1);
        popup1.removeEventListener('click', overlayHandler1);
        closeBtn1.addEventListener('click', closeHandler1);
        popup1.addEventListener('click', overlayHandler1);

        // Đặt timer tự động kết thúc sau 5 giây (không chuyển popup tiếp theo)
        timer = setTimeout(() => {
            if (!isFinished && popup1.style.display === 'flex') {
                finishSequence();
            }
        }, 5000);
    }

    // Khởi động với popup2
    function startWithPopup2() {
        if (isFinished) return;
        popup1.style.display = 'none';
        popup2.style.display = 'flex';

        // Gắn sự kiện đóng cho popup2 (bấm nút X hoặc overlay → kết thúc chuỗi ngay)
        const closeHandler2 = function(e) {
            e.stopPropagation();
            finishSequence();
        };
        const overlayHandler2 = function(e) {
            if (e.target === popup2) {
                finishSequence();
            }
        };
        closeBtn2.removeEventListener('click', closeHandler2);
        popup2.removeEventListener('click', overlayHandler2);
        closeBtn2.addEventListener('click', closeHandler2);
        popup2.addEventListener('click', overlayHandler2);

        // Timer 5 giây sau sẽ chuyển sang popup1
        clearTimer();
        timer = setTimeout(() => {
            if (!isFinished && popup2.style.display === 'flex') {
                showPopup1();
            }
        }, 5000);
    }

    // Bắt đầu
    startWithPopup2();
})();
</script>

</body>
</html>
